<div class="distrMeetingListItem" data-bind="class.open:isOpen;class.distrMeetingListItemReadOnly:isReadOnly" id="itmc_{%GENERATE%}">
    <div class="distrMeetingItemHead stackLeft" event-bind="click:openMeetingDetail(Id)">
        <i data-bind="class:CategoryIconClass; style.color:StatusTypeColor"></i>
        <div class="distrMeetingItemDt" data-bind="text:previewDt"></div>
        <div class="distrMeetingItemTitle" data-bind="text:Title"></div>
        <div class="distrMeetingConversationId" data-bind="class!.hidden:isMailConversation; text:MailConversationId"></div>
    </div>

    <div data-bind="class!.hidden:isOpen">

        <div class="preMeetingParticipantsRow stackLeft" data-bind="itemsSource:Participants" data-key="UserId">
            <div class="lt-template preMeetingParticipantsRowItem" data-bind="text:UserName"></div>
        </div>

        <textarea data-bind="text:Text;readonly:isReadOnly;class.distrMeetingTextReadOnly:isReadOnly" lt-name="meetingText" event-bind="input:meetingTextChange(Id, this.value)"></textarea>
        <div class="distrMeetingConversationLinkWrap" data-bind="class!.hidden:isMailConversation">
            <button type="button" class="distrMeetingConversationLink" data-bind="class!.hidden:canOpenConversation;text:mailConversationLinkText" event-bind="click:openMailConversation(Id)"></button>
            <span class="distrMeetingConversationLabel" data-bind="class.hidden:canOpenConversation;text:mailConversationLinkText"></span>
        </div>
        <i class="fas fa-check-square" data-bind="class!.hidden:textDirty;class.hidden:isReadOnly" event-bind="click:saveMeetingText(Id, $meetingText.value)"></i>

        <div class="preMeetingStatusButtonsRow" data-bind="itemsSource:Actions" data-key="Id">
            <button class="lt-template stackLeft" data-bind="style.backgroundColor:StatusTypeColor" event-bind="click:setMeetingStatus(meetingId, StatusTypeId)">
                <i data-bind="class:StatusTypeIconClass"></i>
                <div data-bind="text:Title"></div>
            </button>
        </div>
        <i class="fas fa-pencil-alt preMeetingrowEditButton" data-bind="class.hidden:isReadOnly" event-bind="click:editMeeting(Id)"></i>
    </div>
</div>
<script>
    lt.element("itmc_{%GENERATE%}").attach(function () { });
</script>
